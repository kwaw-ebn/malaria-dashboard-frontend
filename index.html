<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malaria Early Warning System</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- HEADER -->
  <header class="bg-blue-700 text-white p-4 text-center">
    <h1 class="text-2xl font-bold">Malaria Risk Dashboard</h1>
    <p class="text-sm">AI-powered outbreak prediction using weather data</p>
  </header>

  <!-- MAIN GRID -->
  <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">

    <!-- INPUT CARD -->
    <div class="bg-white shadow rounded-lg p-4">
      <h2 class="font-semibold text-lg mb-2">📊 Weather Input</h2>
      
      <label class="block text-sm font-medium mt-2">Rainfall (mm)</label>
      <input type="number" id="rainfall" placeholder="e.g. 120" class="border rounded w-full p-2" />

      <label class="block text-sm font-medium mt-2">Temperature (°C)</label>
      <input type="number" id="temperature" placeholder="e.g. 28" class="border rounded w-full p-2" />

      <label class="block text-sm font-medium mt-2">Humidity (%)</label>
      <input type="number" id="humidity" placeholder="e.g. 75" class="border rounded w-full p-2" />

      <button onclick="predict()" class="mt-4 bg-blue-700 text-white w-full p-2 rounded hover:bg-blue-800 transition">
        🔍 Predict Risk
      </button>
    </div>

    <!-- RESULT CARD -->
    <div class="bg-white shadow rounded-lg p-4">
      <h2 class="font-semibold text-lg mb-2">🚨 Prediction Result</h2>
      <h2 id="prediction" class="text-3xl font-bold">--</h2>
      <p id="risk" class="text-lg">--</p>
    </div>

    <!-- CHART CARD -->
    <div class="bg-white shadow rounded-lg p-4 col-span-1 md:col-span-2 lg:col-span-3">
      <h2 class="font-semibold text-lg mb-2">📈 Trend Forecast</h2>
      <canvas id="chart" class="w-full h-64"></canvas>
    </div>

  </main>

  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
