<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malaria Early Warning System</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body class="bg-gray-100 font-sans">

  <!-- SIDEBAR -->
  <div class="fixed top-0 left-0 h-full w-64 bg-indigo-700 text-white p-6 flex flex-col">
    <h2 class="text-2xl font-bold mb-2">🌍 Malaria AI</h2>
    <p class="text-indigo-200">Early Warning System</p>
  </div>

  <!-- MAIN CONTENT -->
  <div class="ml-64 p-6">

    <!-- HEADER -->
    <header class="mb-6">
      <h1 class="text-3xl font-bold mb-1">Malaria Risk Dashboard</h1>
      <p class="text-gray-600">AI-powered outbreak prediction using weather data</p>
    </header>

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- INPUT CARD -->
      <div class="bg-white shadow-lg rounded-xl p-6">
        <h3 class="text-lg font-semibold mb-4">📊 Weather Input</h3>

        <label class="block mb-2">Rainfall (mm)</label>
        <input type="number" id="rainfall" placeholder="e.g. 120" class="w-full p-2 border rounded mb-4" />

        <label class="block mb-2">Temperature (°C)</label>
        <input type="number" id="temperature" placeholder="e.g. 28" class="w-full p-2 border rounded mb-4" />

        <label class="block mb-2">Humidity (%)</label>
        <input type="number" id="humidity" placeholder="e.g. 75" class="w-full p-2 border rounded mb-4" />

        <button onclick="predict()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded font-semibold">
          🔍 Predict Risk
        </button>
      </div>

      <!-- RESULT CARD -->
      <div class="bg-white shadow-lg rounded-xl p-6">
        <h3 class="text-lg font-semibold mb-4">🚨 Prediction Result</h3>
        <h2 id="prediction" class="text-3xl font-bold mb-2">--</h2>
        <p id="risk" class="text-xl">--</p>
      </div>

      <!-- CHART CARD -->
      <div class="bg-white shadow-lg rounded-xl p-6 md:col-span-2">
        <h3 class="text-lg font-semibold mb-4">📈 Trend Forecast</h3>
        <canvas id="chart" class="w-full h-64"></canvas>
      </div>

      <!-- MAP CARD -->
      <div class="bg-white shadow-lg rounded-xl p-6 md:col-span-2">
        <h3 class="text-lg font-semibold mb-4">🗺️ Nigeria Malaria Risk Map</h3>
        <div id="map" class="w-full h-96"></div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
